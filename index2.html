<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="Stylesheet" href="style2.css">
</head>

<body>
    <div class="container">
        <form>

            <h1>Sign in</h1>




            <div class="input-container">
                <input placeholder="Email" type="email" required>
                <img width="20" height="20" src="https://img.icons8.com/material-rounded/24/user-male-circle.png" alt="user-male-circle"/>

            </div>

            <div class="input-container">
                <input placeholder="password" type="password" required>
                <img width="20" height="20" src="https://img.icons8.com/ios-filled/50/lock.png" alt="lock"/>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="submit-button">Log in</button>

            <div class="register-link">

                <p>Don't have an account?<a href="#">Sing up</a></p>
            </div>
        </form>

    </div>
    





</body>

</html>
